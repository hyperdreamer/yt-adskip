<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YT AdSkip</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <span class="logo" aria-hidden="true">⏭</span>
        <h1 class="title">YT AdSkip</h1>
      </header>

      <section class="toggle-row">
        <label class="toggle" for="enabled">
          <input type="checkbox" id="enabled" />
          <span class="slider" aria-hidden="true"></span>
          <span class="toggle-label" id="enabled-label">Enabled</span>
        </label>
      </section>

      <section class="status">
        <span class="dot" id="status-dot" aria-hidden="true"></span>
        <span class="status-text" id="status-text">Active</span>
      </section>

      <section class="stats">
        <div class="stat">
          <span class="stat-label">Skips today</span>
          <span class="stat-value" id="stat-today">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Total skips</span>
          <span class="stat-value" id="stat-total">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Last skip</span>
          <span class="stat-value" id="stat-last">never</span>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
